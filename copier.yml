# Copier template configuration for Python package projects

_subdirectory: template

_templates_suffix: .jinja

_exclude:
  - ".git"
  - "__pycache__"
  - "*.pyc"
  - ".DS_Store"
  - ".venv"
  - ".pytest_cache"
  - "htmlcov"
  - "*.egg-info"

# A project's identity. Shipped once, so a new project has something to render,
# and never delivered again.
#
# These are binaries, so copier cannot three-way merge them: on every update it
# overwrites them with the template's placeholder, with no conflict, no .rej and
# no output. Nothing marks the loss -- the project's own logo is simply gone,
# and the docs render the template's wordmark under the project's name. Calling
# them "local-owned" in the update skill does not help: that is a convention for
# whoever resolves the update, and this never reaches a resolution step.
# _skip_if_exists is the only thing copier itself honours here.
_skip_if_exists:
  - "docs/assets/logo.png"
  - "docs/assets/logo_dark.png"
  - "docs/assets/logo_light.png"
  - "docs/assets/favicon.png"
  # Seed pages, and the same shape of problem as the logos above. Every real
  # project rewrites these two wholesale -- the template's `hello("World")` tour
  # and placeholder landing page survive nowhere. The template then keeps trying
  # to patch them, and copier applies an update as a diff against the *template's*
  # version: when the local file no longer resembles it, one shifted line rejects
  # the whole hunk and the page reverts to the placeholder, with the project's
  # content left only in a .rej nobody reads.
  #
  # v0.22.0 proved it: gating a blank line behind {% if include_examples %} was a
  # whitespace-only change for projects without examples, and it still replaced a
  # 244-line curated tutorial with the 74-line stub. Five of five projects with a
  # customised getting-started.md were hit by that one release.
  #
  # Unlike the logos there is no merge to lose: a project that has rewritten these
  # wants nothing the template ships in them. Seed once; never deliver again.
  - "docs/index.md"
  - "docs/pages/tutorials/getting-started.md"
  # The gallery index goes the same way once a project curates it: yohou's lists
  # six hand-written section pages, and v0.22.0 overwrote it with the generic
  # one-page version. The skill's own file-classification.md already says this
  # file "must never be overwritten" -- that classification is advisory and
  # copier ignores it; this line is what enforces it.
  - "docs/pages/examples/index.md"

_envops:
  block_start_string: "{%"
  block_end_string: "%}"
  variable_start_string: "{{"
  variable_end_string: "}}"
  comment_start_string: "{#"
  comment_end_string: "#}"
  keep_trailing_newline: true

# uv.lock is tracked (not gitignored) and CI/hooks run with --locked, so the
# lockfile must exist and be committed before the first push, or CI will fail.
_message_after_copy: |
  Next steps:
    1. cd into your new project
    2. just install        # creates the uv.lock (uv sync) and installs the git hooks
    3. git add uv.lock && git commit   # commit the lockfile — CI runs with --locked

project_name:
  type: str
  help: "Name of the new project (e.g., 'My Awesome Package')"

package_name:
  type: str
  help: "Python package name (e.g., 'my_awesome_package')"
  default: "{{ project_name.lower().replace(' ', '_').replace('-', '_') }}"

project_slug:
  type: str
  help: "Project slug for URLs and repositories (e.g., 'my-awesome-package')"
  default: "{{ project_name.lower().replace(' ', '-').replace('_', '-') }}"

description:
  type: str
  default: ""
  help: "Short project description (one line)"

author_name:
  type: str
  help: "Author or maintainer name"

author_email:
  type: str
  help: "Author or maintainer email"

github_username:
  type: str
  help: "GitHub username or organization"
  default: "stateful-y"

license:
  type: str
  help: "Project license"
  default: "MIT"
  choices:
    - "Apache-2.0"
    - "MIT"
    - "BSD-3-Clause"
    - "GPL-3.0"
    - "Proprietary"

min_python_version:
  type: str
  help: "Minimum Python version"
  default: "3.11"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"

max_python_version:
  type: str
  help: "Maximum Python version"
  default: "3.14"
  choices:
    - "3.11"
    - "3.12"
    - "3.13"
    - "3.14"
  validator: "{% if max_python_version < min_python_version %}Maximum Python version must be >= minimum Python version (min: {{ min_python_version }}, max: {{ max_python_version }}){% endif %}"

include_actions:
  type: bool
  help: "Include GitHub Actions CI/CD workflows?"
  default: true

include_examples:
  type: bool
  help: "Include examples/ directory with marimo notebooks?"
  default: true
