# Read the Docs configuration
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  # Zensical is not one of Read the Docs' built-in builders (only `mkdocs:` and
  # `sphinx:` exist), so the build runs as explicit commands. This repo's own
  # docs have no API-page prebuild step, so the commands are simpler than the
  # ones the template ships to generated projects.
  #
  # VERIFY ON A LIVE READ THE DOCS BUILD. Read the Docs rejects a malformed
  # config outright; every item below is a plain, unquoted scalar for that reason.
  commands:
    - asdf plugin add uv || true
    - asdf install uv latest
    - asdf global uv latest
    # Docs deps only; this repo's docs do not import the project.
    - uv sync --group docs --no-install-project
    # Zensical has no site-dir flag: it builds to the default `site/`. Read the
    # Docs publishes whatever is under $READTHEDOCS_OUTPUT/html.
    - uv run --no-sync zensical build
    - mkdir -p $READTHEDOCS_OUTPUT/html
    - cp -r site/. $READTHEDOCS_OUTPUT/html/
