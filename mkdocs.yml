site_name: Python Package Copier
site_description: A modern Python package template based on copier using uv, ruff, ty, pytest, mkdocs, and nox
site_author: GitHub Contributors
site_url: https://python-package-copier.readthedocs.io/
repo_url: https://github.com/stateful-y/python-package-copier
edit_uri: edit/main/docs/

# The theme override moved out of docs_dir to docs_theme/, so no build tooling
# lives under docs/ and there is nothing for exclude_docs to suppress. The
# successor engine (Zensical) ignores exclude_docs anyway, so location -- not a
# config key -- is what keeps the override unpublished, under either engine.
theme:
  name: material
  custom_dir: docs_theme/overrides
  favicon: assets/favicon.png
  logo: assets/logo.png

  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
    - Quick Start: pages/tutorials/quickstart.md
  - How-to Guides:
    - Set Up CI/CD Services: pages/how-to/setup-cicd.md
    - Customize Your Project: pages/how-to/customize-template.md
    - Update from Template: pages/how-to/update-template.md
    - Add Dependencies: pages/how-to/add-dependencies.md
    - Contribute to the Template: pages/how-to/contribute.md
  - Explanation:
    - Architecture Overview: pages/explanation/architecture.md
    - Release Process: pages/explanation/release-process.md
  # Reference is last on purpose: it is the section you arrive at knowing what
  # you want, so it earns its place by being findable, not by being passed
  # through -- learn, do, understand, then look things up. Same order the
  # generated template's own nav uses.
  - Reference:
    - Template Variables: pages/reference/template-variables.md
    - Project Structure: pages/reference/project-structure.md
    - Commands: pages/reference/commands.md
    - GitHub Workflows: pages/reference/github-workflows.md
    - Configuration Files: pages/reference/configuration.md

extra_javascript:
  - javascripts/readthedocs.js

watch:
  # Deliberately NOT mkdocs.yml: MkDocs already watches its own config file during
  # `serve`, independent of this key, so listing it buys nothing -- and under the
  # successor engine (Zensical) a config file that names itself in `watch:` makes
  # the build emit ZERO html, silently, at exit 0, even under `--strict`. Re-adding
  # it would publish an empty site from a green build.
  - docs
