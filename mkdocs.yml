site_name: Python Package Copier
site_description: A modern Python package template based on copier using uv, ruff, ty, pytest, mkdocs, and nox
site_author: GitHub Contributors
site_url: https://python-package-copier.readthedocs.io/
repo_url: https://github.com/stateful-y/python-package-copier
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/material/overrides
  favicon: assets/favicon.png
  logo: assets/logo.png

  features:
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate

  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
    - Quick Start: pages/tutorials/quickstart.md
  - How-to Guides:
    - Set Up CI/CD Services: pages/how-to/setup-cicd.md
    - Customize Your Project: pages/how-to/customize-template.md
    - Update from Template: pages/how-to/update-template.md
    - Add Dependencies: pages/how-to/add-dependencies.md
    - Contribute to the Template: pages/how-to/contribute.md
  - Reference:
    - Template Variables: pages/reference/template-variables.md
    - Project Structure: pages/reference/project-structure.md
    - Commands: pages/reference/commands.md
    - GitHub Workflows: pages/reference/github-workflows.md
    - Configuration Files: pages/reference/configuration.md
  - Explanation:
    - Architecture Overview: pages/explanation/architecture.md
    - Release Process: pages/explanation/release-process.md

extra_javascript:
  - javascripts/readthedocs.js

watch:
  - mkdocs.yml
  - docs
